<!DOCTYPE html>
<html>
<head>
    <title>JS Tetris - With Start Button</title>
    <style>
        body { 
            background: #202028; 
            color: #fff; 
            font-family: sans-serif; 
            text-align: center; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #game-container { position: relative; }
        #score { font-size: 40px; margin-bottom: 10px; }
        canvas { border: solid 4px #fff; background-color: #000; }
        
        /* The Menu Overlay */
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        button {
            padding: 15px 30px;
            font-size: 20px;
            background: #0DC2FF;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        button:hover { background: #00a0d6; }
        .controls { margin-top: 20px; color: #aaa; font-size: 14px; }
    </style>
</head>
<body>

    <div id="score">0</div>

    <div id="game-container">
        <div id="overlay">
            <h2 id="status-text">READY?</h2>
            <button id="start-btn">START GAME</button>
        </div>
        <canvas id="tetris" width="240" height="400"></canvas>
    </div>
    
    <div class="controls">
        Arrows to Move/Drop | Q/W to Rotate
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('start-btn');
        const statusText = document.getElementById('status-text');
        
        context.scale(20, 20);

        let gameRunning = false;

        function createPiece(type) {
            if (type === 'I') return [,,,];
            if (type === 'L') return [,,];
            if (type === 'J') return [,,];
            if (type === 'O') return [,];
            if (type === 'Z') return [,,];
            if (type === 'S') return [,,];
            if (type === 'T') return [,,];
        }

        const colors = [null, '#FF0D72', '#0DC2FF', '#0DFF72', '#F538FF', '#FF8E0D', '#FFE138', '#3877FF'];

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) matrix.push(new Array(w).fill(0));
            return matrix;
        }

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
                });
            });
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
            if (dir > 0) matrix.forEach(row => row.reverse());
            else matrix.reverse();
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) player.pos.x -= dir;
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena.length / 2 | 0) - (player.matrix.length / 2 | 0);
            if (collide(arena, player)) {
                gameRunning = false;
                statusText.innerText = "GAME OVER";
                startBtn.innerText = "RESTART";
                overlay.style.display = 'flex';
            }
        }

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1).fill(0);
                arena.unshift(row);
                ++y;
                score += rowCount * 10;
                rowCount *= 2;
            }
            updateScore();
        }

        function updateScore() {
            document.getElementById('score').innerText = score;
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;

        function update(time = 0) {
            if (!gameRunning) return;
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) playerDrop();
            draw();
            requestAnimationFrame(update);
        }

        const arena = createMatrix(12, 20);
        const player = { pos: {x: 0, y: 0}, matrix: null };
        let score = 0;

        startBtn.addEventListener('click', () => {
            arena.forEach(row => row.fill(0));
            score = 0;
            updateScore();
            playerReset();
            gameRunning = true;
            overlay.style.display = 'none';
            update();
        });

        document.addEventListener('keydown', event => {
            if (!gameRunning) return;
            if (event.keyCode === 37) playerMove(-1);
            else if (event.keyCode === 39) playerMove(1);
            else if (event.keyCode === 40) playerDrop();
            else if (event.keyCode === 81) { rotate(player.matrix, -1); if(collide(arena,player)) rotate(player.matrix, 1); }
            else if (event.keyCode === 87) { rotate(player.matrix, 1); if(collide(arena,player)) rotate(player.matrix, -1); }
        });

        draw(); // Draw empty board initially
    </script>
</body>
</html>
